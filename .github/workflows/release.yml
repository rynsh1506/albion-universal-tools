name: "Build & Release Avalonian Tools 🚀"

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows-latest"
            build: "desktop"
          - platform: "ubuntu-22.04"
            build: "desktop"
          - platform: "ubuntu-22.04"
            build: "android"

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android

      - name: Setup Java (Android Only)
        if: matrix.build == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Android SDK (Android Only)
        if: matrix.build == 'android'
        uses: android-actions/setup-android@v3

      - name: Setup NDK (Android Only)
        if: matrix.build == 'android'
        run: |
          sdkmanager "ndk;29.0.14206865"
          echo "NDK_HOME=$ANDROID_HOME/ndk/29.0.14206865" >> $GITHUB_ENV

      - name: Install Linux dependencies (Ubuntu Desktop Only)
        if: matrix.platform == 'ubuntu-22.04' && matrix.build == 'desktop'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Frontend Dependencies
        run: npm install

      # ==========================================
      # 💻 DESKTOP BUILD (Windows & Linux)
      # ==========================================
      - name: Build Desktop App & Create Release
        if: matrix.build == 'desktop'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "Avalonian Tools v__VERSION__"
          releaseBody: |
            ## 🚀 Avalonian Tools Automated Build

            This release was automatically generated via GitHub Actions.

            ### 📱 Supported Platforms:
            - **Windows**: `.msi` / `.exe`
            - **Linux**: `.AppImage` / `.deb`
            - **Android**: `.apk`

            *Just download and install the version compatible with your device!*
          releaseDraft: false
          prerelease: false

      # ==========================================
      # 📱 ANDROID BUILD (APK)
      # ==========================================
      - name: Decode Keystore
        if: matrix.build == 'android'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > ${{ github.workspace }}/avalonian.jks

      - name: Build Android APK
        if: matrix.build == 'android'
        run: npx tauri android build --apk
        env:
          TAURI_ANDROID_KEYSTORE: ${{ github.workspace }}/avalonian.jks
          TAURI_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          TAURI_ANDROID_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          TAURI_ANDROID_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Get Version from package.json
        id: app_version
        if: matrix.build == 'android'
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Extract & Rename APKs (Android Only)
        if: matrix.build == 'android'
        run: |
          mkdir -p release-apks
          find src-tauri/gen/android/app/build/outputs/apk -name "*.apk" -type f -exec cp {} release-apks/ \;
          cd release-apks
          for file in *.apk; do mv "$file" "Avalonian-Tools-v${{ steps.app_version.outputs.VERSION }}-$file"; done

      - name: Upload Android APK to Release
        if: matrix.build == 'android'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.app_version.outputs.VERSION }}
          files: release-apks/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
